    likelihood: low # low | medium | high
    impact: medium # low | medium | high
    mitigation: "Changes to the APIs themselves may be mitagated by fixes to the application's code."

# ============================================================
# 9. OPEN QUESTIONS
# ============================================================
open_questions:
  - id: Q-001
    question: "Can UMLS provide similar responses to OLS?"
    owner: "Yelena will perform similar discovery work for UMLS if time permits."
    due: "2026-06-15"

# ============================================================
# 10. DECISION LOG
# ============================================================
decision_log:
  - id: D-001
    date: "2026-05-28"
    decision: "We decided to only support relationship types of type SubclassOf for now"
    rationale: "Any other type would be a totally different endpoint and will require similar amounts of work to support."
    alternatives_considered:
      - "Investigate other possibilities, such as ancestors, etc."
  - id: D-002
    date: "2026-05-28"
    decision: "CSV Export"
    rationale: "To remain consistent with the other search dragon functionality"
    alternatives_considered:
      - "There was consideration of returning objects. Ultimately, it may be worth refactoring the app to return objects and let the application itself decide the final format"

